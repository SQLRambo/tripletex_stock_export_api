<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tripletex Lagerantall</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 1.5rem;
    }

    .tab {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    input[type="text"], input[type="password"], input[type="date"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #111;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 1rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.25rem 0;
    }

    .report-type {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .report-type-btn {
      flex: 1;
      padding: 0.45rem 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #555;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .report-type-btn.active {
      border-color: #2563eb;
      color: #2563eb;
      background: #eff6ff;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .hint {
      font-size: 0.75rem;
      color: #888;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      font-size: 0.8125rem;
      margin-bottom: 1.25rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.65rem;
      background: #2563eb;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover { background: #1d4ed8; }

    button[type="submit"]:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading .spinner { display: inline-block; }
    .loading .btn-text { display: none; }
    .btn-text { display: inline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tripletex Lagerantall</h1>
    <p class="subtitle">Eksporter kostpris og antall på lager for alle produkter</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="tabs">
      <button class="tab active" onclick="switchTab('keys', this)" type="button">Nøkler</button>
      <button class="tab" onclick="switchTab('token', this)" type="button">Økt-token</button>
    </div>

    <form method="POST" action="/export" id="main-form" onsubmit="handleSubmit(this)">
      <!-- Keys panel -->
      <div class="panel active" id="panel-keys">
        <label for="consumer_key">Forbruker-nøkkel</label>
        <input type="password" id="consumer_key" name="consumer_key" autocomplete="off" placeholder="Consumer token">

        <label for="user_key">Bruker-nøkkel</label>
        <input type="password" id="user_key" name="user_key" autocomplete="off" placeholder="Employee token">
      </div>

      <!-- Session token panel -->
      <div class="panel" id="panel-token">
        <label for="session_token">Økt-token</label>
        <input type="text" id="session_token" name="session_token" autocomplete="off" placeholder="Session token">
        <p class="hint">Bruk dette hvis du allerede har et aktivt økt-token.</p>
      </div>

      <hr class="divider">

      <!-- Report type -->
      <label>Rapporttype</label>
      <div class="report-type">
        <button type="button" class="report-type-btn active" id="btn-standard" onclick="setReportType('standard')">Lagerantall (nå)</button>
        <button type="button" class="report-type-btn" id="btn-date" onclick="setReportType('date')">Lagerverdi per dato</button>
      </div>

      <div id="date-section" style="display:none;">
        <label for="report_date">Dato</label>
        <input type="date" id="report_date" name="report_date">
      </div>

      <button type="submit" id="submit-btn">
        <span class="spinner"></span>
        <span class="btn-text">Last ned CSV</span>
      </button>
    </form>
  </div>

  <script>
    function switchTab(name, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
    }

    function setReportType(type) {
      const form = document.getElementById('main-form');
      const dateSection = document.getElementById('date-section');
      document.getElementById('btn-standard').classList.toggle('active', type === 'standard');
      document.getElementById('btn-date').classList.toggle('active', type === 'date');
      if (type === 'date') {
        dateSection.style.display = 'block';
        if (!document.getElementById('report_date').value) {
          document.getElementById('report_date').value = new Date().toISOString().slice(0, 10);
        }
        form.action = '/export-by-date';
      } else {
        dateSection.style.display = 'none';
        form.action = '/export';
      }
    }

    function handleSubmit(form) {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.querySelector('.btn-text').textContent = 'Henter data…';
      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.querySelector('.btn-text').textContent = 'Last ned CSV';
      }, 15000);
    }
  </script>
</body>
</html>
